server:
  port: 8080

spring:
  application:
    name: WMSBigDataLab

  datasource:
    url: jdbc:postgresql://localhost:5432/wmsbigdatalab
    username: postgres
    password: 20200730
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml

wiki:
  upload:
    path: ./uploads
  jwt:
    secret: WMSBigDataLabSecretKey2024VeryLongSecretKey
    expire: 7200
  rate-limit:
    tokens-per-second: 10
    bucket-size: 20